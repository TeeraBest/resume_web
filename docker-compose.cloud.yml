version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resume_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_pass}
      POSTGRES_DB: ${POSTGRES_DB:-resume_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7.2-alpine
    volumes:
      - valkey-data:/data
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/resume-backend:latest
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_HOST: valkey
      VALKEY_PORT: ${VALKEY_PORT:-6379}
      CACHE_TTL: ${CACHE_TTL:-300}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - valkey
    restart: unless-stopped

  kong:
    image: kong:3.6-ubuntu
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_LOG_LEVEL: warn
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/resume-frontend:latest
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - kong
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
