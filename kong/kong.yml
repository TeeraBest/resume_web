_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────
# Services — upstream backend
# ─────────────────────────────────────────
services:
  - name: resume-backend
    url: http://backend:3001
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    retries: 3
    routes:
      - name: resume-api-v1
        paths:
          - /api/v1
        strip_path: false
        preserve_host: false
        methods:
          - GET
          - OPTIONS
      - name: swagger-ui
        paths:
          - /docs
        strip_path: false
        preserve_host: false
        methods:
          - GET
          - HEAD
    plugins:
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Kong-Proxy:true"

# ─────────────────────────────────────────
# Global Plugins
# ─────────────────────────────────────────
plugins:
  # CORS — allow browser requests from any origin in dev
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
        - X-Requested-With
      exposed_headers:
        - X-Kong-Proxy
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
      max_age: 3600
      credentials: false

  # Rate limiting — 60 requests per minute per IP
  - name: rate-limiting
    config:
      minute: 60
      policy: local
      fault_tolerant: true
      hide_client_headers: false
      error_code: 429
      error_message: "API rate limit exceeded. Max 60 requests per minute."
