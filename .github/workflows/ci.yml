name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # cache: npm
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Build backend
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # cache: npm
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker production build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend production image
        run: |
          docker build --target production -t resume-backend:prod ./backend
      - name: Build frontend production image
        run: |
          docker build --target production -t resume-frontend:prod ./frontend
