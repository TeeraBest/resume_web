name: Deploy to Docker host

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy cloud stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to remote Docker host
        uses: docker/login-action@v5
        with:
          registry: ${{ secrets.DOCKER_HOST_REGISTRY }}
          username: ${{ secrets.DOCKER_HOST_USERNAME }}
          password: ${{ secrets.DOCKER_HOST_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HOST_REGISTRY }}/resume-backend:latest
            ${{ secrets.DOCKER_HOST_REGISTRY }}/resume-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.FRONTEND_API_BASE_URL }}
          tags: |
            ${{ secrets.DOCKER_HOST_REGISTRY }}/resume-frontend:latest
            ${{ secrets.DOCKER_HOST_REGISTRY }}/resume-frontend:${{ github.sha }}
      - name: Deploy remote compose stack
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_REMOTE_PATH }} && ./deploy.sh"
