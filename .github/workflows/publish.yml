name: Publish Docker images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish backend and frontend containers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-backend:latest
            ghcr.io/${{ github.repository_owner }}/resume-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000/api/v1
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-frontend:latest
            ghcr.io/${{ github.repository_owner }}/resume-frontend:${{ github.sha }}
