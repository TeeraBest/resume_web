version: "3.9"

networks:
  resume-network:
    driver: bridge

volumes:
  postgres-data:
  valkey-data:

services:
  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resume-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=resume_user
      - POSTGRES_PASSWORD=resume_pass
      - POSTGRES_DB=resume_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - resume-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_db"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Valkey 7 (Redis-compatible cache)
  # ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: resume-valkey
    expose:
      - "6379"
    volumes:
      - valkey-data:/data
    networks:
      - resume-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Backend — Node.js + Fastify + Prisma
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: resume-backend
    expose:
      - "3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://resume_user:resume_pass@postgres:5432/resume_db
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - CACHE_TTL=300
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - resume-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Kong API Gateway (DB-less mode)
  # ─────────────────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: resume-kong
    ports:
      - "8000:8000"   # proxy
      - "8001:8001"   # admin API (dev only)
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_LOG_LEVEL=warn
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - backend
    networks:
      - resume-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend — React + TypeScript (Vite)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: resume-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - resume-network
    restart: unless-stopped
